<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cavite Water Services</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h2>Cavite Water Billing Statement System</h2>

      <div class="counter-box">
        Transactions Processed: <span id="transactionCount">0</span>
      </div>

      <form id="billingForm">
        <div class="form-group">
          <label for="customerName">Customer Name:</label>
          <input
            type="text"
            id="customerName"
            required
            placeholder="Enter full name"
          />
        </div>

        <div class="form-group">
          <label for="consumption">Water Consumption (m³):</label>
          <input
            type="number"
            id="consumption"
            min="0"
            step="0.01"
            required
            placeholder="e.g., 25"
          />
        </div>

        <div class="form-group">
          <label for="customerType">Customer Type:</label>
          <select id="customerType">
            <option value="Regular">Regular</option>
            <option value="Senior Citizen">Senior Citizen (25% Disc.)</option>
            <option value="Solo Parent">Solo Parent (15% Disc.)</option>
          </select>
        </div>

        <button type="button" id="generateBtn">Generate Bill</button>
      </form>

      <div id="billingStatement" class="statement-box hidden">
        <h3>Official Billing Statement</h3>
        <hr />
        <p><strong>Statement Date:</strong> <span id="stmtDate"></span></p>
        <p><strong>Customer Name:</strong> <span id="stmtName"></span></p>
        <p><strong>Customer Type:</strong> <span id="stmtType"></span></p>
        <p>
          <strong>Consumption:</strong> <span id="stmtConsumption"></span> m³
        </p>
        <hr />
        <p><strong>Gross Amount:</strong> ₱<span id="stmtGross">0.00</span></p>
        <p>
          <strong>Discount Applied:</strong> ₱<span id="stmtDiscount"
            >0.00</span
          >
        </p>
        <h4 class="total-due">
          Total Amount Due: ₱<span id="stmtTotal">0.00</span>
        </h4>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
